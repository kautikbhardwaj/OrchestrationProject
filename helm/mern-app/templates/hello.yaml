apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-service
  labels:
    {{- include "mern.labels" . | nindent 4 }}
    app: hello-service
spec:
  replicas: {{ .Values.replicaCount.hello }}
  selector:
    matchLabels:
      app: hello-service
  template:
    metadata:
      labels:
        app: hello-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: hello-service
          image: "{{ .Values.image.hello.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - { name: PORT, value: "3001" }
          ports:
            - { name: http, containerPort: 3001 }
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 3
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 10
          resources:
            {{- toYaml .Values.resources.hello | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: hello-service
  labels:
    {{- include "mern.labels" . | nindent 4 }}
spec:
  selector:
    app: hello-service
  ports:
    - name: http
      port: {{ .Values.service.hello.port }}
      targetPort: http
