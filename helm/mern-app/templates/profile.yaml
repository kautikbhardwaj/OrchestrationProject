apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile-service
  labels:
    {{- include "mern.labels" . | nindent 4 }}
    app: profile-service
spec:
  replicas: {{ .Values.replicaCount.profile }}
  selector:
    matchLabels:
      app: profile-service
  template:
    metadata:
      labels:
        app: profile-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: profile-service
          image: "{{ .Values.image.profile.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - { name: PORT, value: "3002" }
            - name: MONGO_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "mern.mongoSecretName" . }}
                  key: {{ .Values.mongodb.secretKey }}
          ports:
            - { name: http, containerPort: 3002 }
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 20
          resources:
            {{- toYaml .Values.resources.profile | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: profile-service
  labels:
    {{- include "mern.labels" . | nindent 4 }}
spec:
  selector:
    app: profile-service
  ports:
    - name: http
      port: {{ .Values.service.profile.port }}
      targetPort: http
