services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: mernapp
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  hello-service:
    build: ./backend/helloService
    restart: unless-stopped
    environment:
      PORT: 3001

  profile-service:
    build: ./backend/profileService
    restart: unless-stopped
    environment:
      PORT: 3002
      MONGO_URL: mongodb://mongodb:27017/mernapp
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - hello-service
      - profile-service

volumes:
  mongo-data:
